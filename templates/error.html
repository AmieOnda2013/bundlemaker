<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BundleMaker — Error</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f5f2eb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; }
    h1 { font-family: 'Playfair Display', serif; color: #0d1b2a; margin-bottom: 12px; }
    p { color: #666; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    a { display: inline-block; background: #0d1b2a; color: #c9a84c; padding: 10px 28px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.88rem; }
    a:hover { background: #1e3a5f; }
  </style>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/static/favicon-192.png"/>
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png"/>
</head>
<body>
  <div class="card">
    <h1>Something went wrong</h1>
    <p>{{ message or "An unexpected error occurred. Please try again." }}</p>
    <a href="/">← Back to BundleMaker</a>
  </div>
</body>
</html>
