<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BundleMaker — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f2eb; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 48px 40px; width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #0d1b2a; letter-spacing: 0.04em; }
    .logo p  { font-size: 0.78rem; color: #888; margin-top: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
    label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #555; margin-bottom: 6px; }
    input[type="password"] { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; margin-bottom: 18px; }
    input:focus { border-color: #c9a84c; }
    .btn { width: 100%; padding: 12px; background: #0d1b2a; color: #c9a84c; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s; margin-top: 4px; }
    .btn:hover { background: #1e3a5f; }
    .error   { background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b; border-radius: 6px; padding: 14px; font-size: 0.88rem; line-height: 1.6; margin-bottom: 18px; }
    .success { background: #f0faf0; border: 1px solid #b2dfdb; color: #2e7d32; border-radius: 6px; padding: 14px; font-size: 0.88rem; line-height: 1.6; margin-bottom: 18px; }
    .footer-link { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #666; }
    .footer-link a { color: #0d1b2a; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .desc { font-size: 0.85rem; color: #888; margin-bottom: 22px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>BundleMaker</h1>
      <p>Court-Ready Legal Bundles</p>
    </div>

    {% if invalid %}
    <div class="error">This password reset link is invalid or has expired (links expire after 1 hour).</div>
    <div class="footer-link">
      <a href="/forgot-password">Request a new link</a>
    </div>

    {% elif error %}
    <div class="error">{{ error }}</div>
    <form method="POST" autocomplete="new-password">
      <input type="hidden" name="token" value="{{ token }}"/>
      <label for="password">New Password</label>
      <input type="password" id="password" name="password" required autofocus minlength="8" placeholder="At least 8 characters"/>
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" required minlength="8" placeholder="Repeat password"/>
      <button type="submit" class="btn">Set New Password</button>
    </form>
    <div class="footer-link"><a href="/login">← Back to Log In</a></div>

    {% else %}
    <p class="desc">Choose a new password for your account.</p>
    <form method="POST" autocomplete="new-password">
      <label for="password">New Password</label>
      <input type="password" id="password" name="password" required autofocus minlength="8" placeholder="At least 8 characters"/>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" required minlength="8" placeholder="Repeat password"/>

      <button type="submit" class="btn">Set New Password</button>
    </form>
    <div class="footer-link">
      <a href="/login">← Back to Log In</a>
    </div>
    {% endif %}
  </div>
</body>
</html>
